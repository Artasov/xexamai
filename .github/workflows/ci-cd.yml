name: CI / CD

on:
  pull_request:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release creation'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  NODE_VERSION: 24
  AWS_DEFAULT_REGION: ru-1
  AWS_S3_FORCE_PATH_STYLE: true
  S3_BUCKET: 324718a4-2cc5dd7a-917b-4e82-87c5-b9d5f8de16ba
  S3_ENDPOINT: https://s3.twcstorage.ru

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build renderer bundle
        run: npm run build:renderer

  package:
    name: Package Tauri (${{ matrix.os }})
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-15
          - ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Build renderer bundle
        run: npm run build:renderer

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cleanup macOS disk images
        if: matrix.os == 'macos-15'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for volume in /Volumes/XEXAMAI /Volumes/XEXAMAI* /Volumes/dmg.*; do
            if [ -d "$volume" ]; then
              hdiutil detach "$volume" || hdiutil detach -force "$volume" || true
            fi
          done
          rm -rf src-tauri/target/release/bundle/dmg

      - name: Build desktop apps with Tauri
        uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: npm run tauri
          args: --verbose
      
      - name: Upload artifacts to S3
        if: success()
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          set -euo pipefail
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            export PATH="$HOME/.local/bin:$PATH"
          fi

          aws configure set default.s3.addressing_style path

          SRC="src-tauri/target/release/bundle"

          if [ ! -d "${SRC}" ]; then
            echo "Source directory ${SRC} not found, nothing to upload."
            exit 1
          fi

          UPLOAD_DIR="$(pwd)/release-filtered"
          LINKS_DIR="$(pwd)/release-links"
          rm -rf "${UPLOAD_DIR}"
          rm -rf "${LINKS_DIR}"
          mkdir -p "${UPLOAD_DIR}"
          mkdir -p "${LINKS_DIR}"

          case "${MATRIX_OS}" in
            windows-latest)
              TARGET="windows"
              FIND_EXPR=(-type f \( -name "*.exe" -o -name "*.msi" \))
              ;;
            macos-15)
              TARGET="macos"
              FIND_EXPR=(-type f -name "*.dmg")
              ;;
            ubuntu-latest)
              TARGET="linux"
              FIND_EXPR=(-type f \( -name "*.AppImage" -o -name "*.deb" \))
              ;;
            *)
              echo "Unknown OS matrix value during filtering: ${MATRIX_OS}"
              exit 1
              ;;
          esac

          LINKS_FILE="${LINKS_DIR}/${TARGET}.md"
          MANIFEST_FILE="${LINKS_DIR}/${TARGET}.json"
          : > "${LINKS_FILE}"

          sha256_file() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" | awk '{print $1}'
            else
              shasum -a 256 "$1" | awk '{print $1}'
            fi
          }

          FOUND=0
          UPDATE_FILENAME=""
          UPDATE_URL=""
          UPDATE_SHA256=""
          while IFS= read -r -d '' artifact; do
            filename="$(basename "${artifact}")"
            sha256="$(sha256_file "${artifact}")"
            file_url="${S3_ENDPOINT}/${S3_BUCKET}/xexamai/${VERSION}/${TARGET}/${filename}"
            cp "${artifact}" "${UPLOAD_DIR}/${filename}"
            echo "- ${filename}: ${file_url}" >> "${LINKS_FILE}"
            use_for_update=0
            if [ -z "${UPDATE_FILENAME}" ]; then
              use_for_update=1
            fi
            case "${TARGET}:${filename}" in
              windows:*.exe|macos:*.dmg|linux:*.AppImage)
                use_for_update=1
                ;;
            esac
            if [ "${use_for_update}" -eq 1 ]; then
              UPDATE_FILENAME="${filename}"
              UPDATE_URL="${file_url}"
              UPDATE_SHA256="${sha256}"
            fi
            FOUND=1
          done < <(find "${SRC}" "${FIND_EXPR[@]}" -print0)

          if [ "${FOUND}" -eq 0 ]; then
            echo "No artifacts matching the upload criteria were found in ${SRC}"
            exit 1
          fi

          python3 - "${TARGET}" "${UPDATE_FILENAME}" "${UPDATE_URL}" "${UPDATE_SHA256}" > "${MANIFEST_FILE}" <<'PY'
          import json
          import sys

          platform, filename, url, sha256_hash = sys.argv[1:5]
          payload = {
              "platform": platform,
              "filename": filename,
              "url": url,
              "sha256": sha256_hash,
          }
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY

          aws s3 cp "${UPLOAD_DIR}" "s3://${S3_BUCKET}/xexamai/${VERSION}/${TARGET}/" \
            --recursive \
            --endpoint-url "${S3_ENDPOINT}" \
            --acl public-read

      - name: Upload release link manifest
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: release-links-${{ matrix.os }}
          path: release-links/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

    steps:
      - name: Download release link manifests
        uses: actions/download-artifact@v7
        with:
          pattern: release-links-*
          path: release-links
          merge-multiple: true

      - name: Publish update manifest
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import glob
          import json
          import os

          version = os.environ["VERSION"].removeprefix("v")
          files = {}
          for path in glob.glob("release-links/*.json"):
              with open(path, encoding="utf-8") as handle:
                  item = json.load(handle)
              files[item["platform"]] = {
                  "file": item["url"],
                  "sha256_hash": item["sha256"],
                  "name": item["filename"],
              }

          required = {"windows", "macos", "linux"}
          missing = sorted(required - set(files))
          if missing:
              raise SystemExit(f"Missing update manifest entries: {', '.join(missing)}")

          with open("latest.json", "w", encoding="utf-8") as handle:
              json.dump({"version": version, "files": files}, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            export PATH="$HOME/.local/bin:$PATH"
          fi

          aws configure set default.s3.addressing_style path
          aws s3 cp latest.json "s3://${S3_BUCKET}/xexamai/latest.json" \
            --endpoint-url "${S3_ENDPOINT}" \
            --acl public-read \
            --content-type application/json
          aws s3 cp latest.json "s3://${S3_BUCKET}/xexamai/${VERSION}/latest.json" \
            --endpoint-url "${S3_ENDPOINT}" \
            --acl public-read \
            --content-type application/json

      - name: Generate release notes with S3 links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"

          echo "Meet **XEXAMAI** - your AI interview assistant" > release-body.md
          echo "" >> release-body.md
          echo "## Download links" >> release-body.md
          echo "" >> release-body.md
          echo "### Windows" >> release-body.md
          cat release-links/windows.md >> release-body.md
          echo "" >> release-body.md
          echo "### macOS" >> release-body.md
          cat release-links/macos.md >> release-body.md
          echo "" >> release-body.md
          echo "### Linux (Debian/Ubuntu)" >> release-body.md
          cat release-links/linux.md >> release-body.md
          echo "" >> release-body.md
          echo "---" >> release-body.md
          echo "## Changes" >> release-body.md
          gh api repos/${{ github.repository }}/releases/generate-notes -F tag_name="$VERSION" -F target_commitish="${{ github.sha }}" --jq '.body' >> release-body.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
